name: Release

permissions:
  pull-requests: write
  contents: write
  id-token: write

on:
  push:
    branches: [main]

jobs:
  release-plz:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'dtcxzyw' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
